<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信用卡還款模擬器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f9f9f9; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #b22222; border-bottom: 2px solid #b22222; padding-bottom: 10px; }
        .input-section { display: flex; gap: 20px; margin-bottom: 20px; background: #fff5f5; padding: 20px; border-radius: 8px; flex-wrap: wrap; }
        .field { flex: 1; min-width: 200px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #b22222; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #8b0000; }
        
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .box { border: 1px solid #ddd; border-radius: 8px; padding: 15px; }
        .box h3 { margin-top: 0; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: right; }
        th { background: #f4f4f4; }
        .highlight-red { color: #d9534f; font-weight: bold; }
        .highlight-blue { color: #31708f; font-weight: bold; }
        .summary-text { margin-top: 15px; padding: 15px; background: #e9f7fe; border-radius: 8px; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>信用卡還款模擬器-by chanki</h2>
    
    <div class="input-section">
        <div class="field">
            <label>初始欠款金額 (MOP/HKD)</label>
            <input type="number" id="principal" value="100000">
        </div>
        <div class="field">
            <label>年利率 (%)</label>
            <input type="number" id="annualRate" value="28.8" step="0.1">
        </div>
        <div class="field">
            <label>最低還款額 (%)</label>
            <input type="number" id="minPayPercent" value="3" step="0.1">
        </div>
        <div class="field">
            <label>模擬時間 (月)</label>
            <input type="number" id="months" value="6">
        </div>
    </div>
    <button onclick="runSimulation()">計算對比明細</button>

    <div id="results" style="display:none;">
        <div class="summary-text" id="summary"></div>
        
        <div class="result-grid">
            <div class="box">
                <h3 style="color:#d9534f">情況 A：完全不還款</h3>
                <p><small>包含每日利息與每月遲繳手續費 (max 80)</small></p>
                <table id="tableA">
                    <thead>
                        <tr>
                            <th>月份</th>
                            <th>當月利息</th>
                            <th>遲繳費</th>
                            <th>期末欠款</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="box">
                <h3 style="color:#31708f">情況 B：每月只還最低額</h3>
                <p><small>包含每日利息，免除遲繳手續費</small></p>
                <table id="tableB">
                    <thead>
                        <tr>
                            <th>月份</th>
                            <th>當月利息</th>
                            <th>還款額</th>
                            <th>期末欠款</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
function runSimulation() {
    const startP = parseFloat(document.getElementById('principal').value);
    const annualRateInput = parseFloat(document.getElementById('annualRate').value) / 100;
    const minPayRate = parseFloat(document.getElementById('minPayPercent').value) / 100;
    const months = parseInt(document.getElementById('months').value);
    const dailyRate = annualRateInput / 365;
    const daysInMonth = 30; // 簡化計算，每月固定30天
    const lateFeeRate = 0.05;

    document.getElementById('results').style.display = 'block';

    // 情況 A 計算
    let balA = startP;
    let totalIntA = 0;
    let totalLateA = 0;
    const tbodyA = document.querySelector('#tableA tbody');
    tbodyA.innerHTML = '';

    for(let m=1; m<=months; m++) {
        let monthlyInt = 0;
        // 每日計息邏輯
        for(let d=1; d<=daysInMonth; d++) {
            monthlyInt += balA * dailyRate;
        }
        
        // 遲繳手續費：最低還款額的5%，最高80
        let tempMin = (balA + monthlyInt) * minPayRate;
        let lateFee = Math.min(tempMin * lateFeeRate, 80);
        
        balA += (monthlyInt + lateFee);
        totalIntA += monthlyInt;
        totalLateA += lateFee;

        tbodyA.innerHTML += `<tr>
            <td>第 ${m} 月</td>
            <td>${monthlyInt.toFixed(2)}</td>
            <td>${lateFee.toFixed(2)}</td>
            <td class="highlight-red">${balA.toFixed(2)}</td>
        </tr>`;
    }

    // 情況 B 計算
    let balB = startP;
    let totalIntB = 0;
    let totalPaidB = 0;
    const tbodyB = document.querySelector('#tableB tbody');
    tbodyB.innerHTML = '';

    for(let m=1; m<=months; m++) {
        let monthlyInt = 0;
        for(let d=1; d<=daysInMonth; d++) {
            monthlyInt += balB * dailyRate;
        }
        
        let minPay = (balB + monthlyInt) * minPayRate;
        
        balB = (balB + monthlyInt) - minPay;
        totalIntB += monthlyInt;
        totalPaidB += minPay;

        tbodyB.innerHTML += `<tr>
            <td>第 ${m} 月</td>
            <td>${monthlyInt.toFixed(2)}</td>
            <td>${minPay.toFixed(2)}</td>
            <td class="highlight-blue">${balB.toFixed(2)}</td>
        </tr>`;
    }

    // 總結顯示
    document.getElementById('summary').innerHTML = `
        <strong>計算總結：</strong><br>
        設定年利率為 <strong>${(annualRateInput * 100).toFixed(2)}%</strong>，最低還款額比例為 <strong>${(minPayRate * 100).toFixed(2)}%</strong>。<br>
        最初欠款 <strong>${startP.toLocaleString()}</strong> 元，經過 ${months} 個月後：<br>
        1. 完全不還款：總欠款會滾動至 <span class="highlight-red">${balA.toFixed(2)}</span> 元。<br>
        2. 只還最低額：您已累計繳納了 <span class="highlight-blue">${totalPaidB.toFixed(2)}</span> 元，但欠款仍餘 <span class="highlight-blue">${balB.toFixed(2)}</span> 元。
    `;
}
</script>

</body>
</html>
