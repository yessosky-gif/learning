<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💰 單利·複利計算機 | 理財工具</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #e6f0f9 0%, #d0e2f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 12px;
        }
        .calculator-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0, 40, 65, 0.3), 0 0 0 1px rgba(255,255,255,0.7) inset;
            width: 100%;
            max-width: 640px;          /* 橫向拉闊，減少縱向需求 */
            padding: 16px 20px;        /* 縮小內邊距 */
        }
        h2 {
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0 0 2px 0;
            background: linear-gradient(135deg, #0f4c5c, #1f6e8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        h2::after {
            content: "⚡";
            font-size: 1.7rem;
            color: #e6a31e;
        }
        .subhead {
            font-size: 0.75rem;
            color: #1e5a77;
            margin-bottom: 12px;
            border-left: 4px solid #3b9cbc;
            padding-left: 12px;
            background: #e5f0fb70;
            border-radius: 0 14px 14px 0;
            line-height: 1.3;
        }
        .input-group {
            margin-bottom: 10px;
        }
        label {
            font-weight: 600;
            font-size: 0.75rem;
            color: #0f4057;
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.3px;
        }
        .input-field {
            width: 100%;
            padding: 8px 12px;
            font-size: 0.9rem;
            border: 2px solid #bfd7e9;
            border-radius: 28px;
            background: white;
            outline: none;
            transition: 0.1s;
        }
        .input-field:focus {
            border-color: #1f7a9e;
            box-shadow: 0 2px 6px rgba(31,122,158,0.1);
        }
        .select-custom {
            width: 100%;
            padding: 8px 12px;
            font-size: 0.9rem;
            border: 2px solid #bfd7e9;
            border-radius: 28px;
            background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%231f7a9e" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>') no-repeat right 14px center;
            background-size: 14px;
            appearance: none;
            -webkit-appearance: none;
            color: #0b2c3d;
            font-weight: 500;
            cursor: pointer;
        }
        .example-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin: 8px 0 12px;
            flex-wrap: wrap;
        }
        .example-btn {
            background: #d5e8fa;
            border: 1px solid #8eb8d4;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #0e3f57;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }
        .example-btn:hover {
            background: #c2def7;
            border-color: #1f7a9e;
        }
        button {
            width: 100%;
            background: #0f4c5c;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            padding: 10px 16px;
            border-radius: 36px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 12px -5px #0f4c5cb0;
            margin: 6px 0 12px 0;
            border: 1px solid #ffffff70;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover {
            background: #1b657b;
            transform: scale(1.01);
        }
        .result-panel {
            background: #e1effa;
            border-radius: 24px;
            padding: 12px 16px;
            border: 2px solid white;
            box-shadow: inset 0 1px 3px #aac4dc, 0 6px 10px -4px #6e95b4;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 5px 0;
            flex-wrap: wrap;
        }
        .result-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #144d64;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f4c5c;
            line-height: 1.2;
            text-align: right;
        }
        .sub-value {
            font-size: 1.1rem;
            color: #1b6b4f;
            font-weight: 600;
        }
        .divider-light {
            height: 1px;
            background: linear-gradient(90deg, #b6d2e9, #ffffff, #b6d2e9);
            margin: 8px 0 6px 0;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #1d4f6e;
            margin-top: 4px;
        }
        .footnote {
            font-size: 0.65rem;
            color: #3f6f8a;
            text-align: center;
            margin-top: 10px;
            background: #d7e9f8;
            padding: 5px 12px;
            border-radius: 30px;
            display: inline-block;
            width: auto;
        }
        #methodDetail {
            font-size: 0.7rem;
            color: #2a6b8a;
            margin-top: 6px;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <h2>📊 單利·複利計算機-by yessosky</h2>
        <div class="subhead">本金·利率·時間·計息方式 — 一鍵比較</div>

        <div class="input-group">
            <label>💰 本金 (P)</label>
            <input type="number" id="principal" class="input-field" value="100000" step="any">
        </div>
        <div class="input-group">
            <label>📈 年利率 (%)</label>
            <input type="number" id="rate" class="input-field" value="6" step="any">
        </div>
        <div class="input-group">
            <label>⏱️ 時間 (年)</label>
            <input type="number" id="years" class="input-field" value="3" step="any">
        </div>
        <div class="input-group">
            <label>🔄 計息方式</label>
            <select id="interestType" class="select-custom">
                <option value="simple">📘 單利 (Simple Interest)</option>
                <option value="compound_1">📈 複利 — 每年 (1次/年)</option>
                <option value="compound_2">📈 複利 — 每半年 (2次/年)</option>
                <option value="compound_4">📈 複利 — 每季 (4次/年)</option>
                <option value="compound_12">📈 複利 — 每月 (12次/年)</option>
                <option value="continuous">✨ 複利 — 連續複利</option>
            </select>
        </div>

        <div class="example-row">
            <span class="example-btn" onclick="fillExample('100000','6','3','simple')">🔹 單利 10萬 6% 3年</span>
            <span class="example-btn" onclick="fillExample('100000','6','3','compound_1')">🔸 複利(年) 10萬 6% 3年</span>
            <span class="example-btn" onclick="fillExample('200000','5','4','compound_2')">📘 半年複利 20萬 5% 4年</span>
            <span class="example-btn" onclick="fillExample('300000','7','5','continuous')">⚡ 連續複利 30萬 7% 5年</span>
        </div>

        <button onclick="calculate()">
            <span>🧮</span> 立即計算 <span>📊</span>
        </button>

        <div class="result-panel" id="resultPanel">
            <div class="result-row">
                <span class="result-label">📌 最終本利和</span>
                <span class="result-value" id="finalAmount">---</span>
            </div>
            <div class="result-row">
                <span class="result-label">💹 利息總額</span>
                <span class="result-value sub-value" id="interestEarned">---</span>
            </div>
            <div class="divider-light"></div>
            <div class="meta-row">
                <span>本金: <span id="principalDisplay">100,000.00</span></span>
                <span id="rateFreqDisplay">6% / 單利</span>
            </div>
            <div id="methodDetail" style="font-size:0.7rem; color:#2a6b8a; margin-top:5px;"></div>
        </div>

        <div class="footnote">
            💡 單利：利息不滾入本金｜複利：利滾利，頻率越高效果越強
        </div>
    </div>

    <script>
        function calculate() {
            const principal = parseFloat(document.getElementById('principal').value);
            const ratePercent = parseFloat(document.getElementById('rate').value);
            const years = parseFloat(document.getElementById('years').value);
            const interestType = document.getElementById('interestType').value;

            if (isNaN(principal) || isNaN(ratePercent) || isNaN(years) || principal < 0 || ratePercent < 0 || years < 0) {
                alert('請填寫有效的正數（本金、利率、時間）');
                return;
            }

            const r = ratePercent / 100;
            let amount = 0;
            let interest = 0;
            let freqText = "";
            let methodDetail = "";

            if (interestType === "simple") {
                amount = principal * (1 + r * years);
                interest = amount - principal;
                freqText = "單利";
                methodDetail = `📐 單利公式：本利和 = ${formatMoney(principal)} × (1 + ${ratePercent/100} × ${years}) = ${formatMoney(amount)}`;
            } 
            else if (interestType === "continuous") {
                amount = principal *  Math.pow(2.718,r_dec * years) ;
                interest = amount - principal;
                freqText = "連續複利";
                methodDetail = `📐 連續複利公式：本利和 = ${formatMoney(principal)} × 2.718^(${r}×${years}) = ${formatMoney(amount)}`;
            }
            else {
                let m = 1;
                if (interestType === "compound_1") m = 1;
                else if (interestType === "compound_2") m = 2;
                else if (interestType === "compound_4") m = 4;
                else if (interestType === "compound_12") m = 12;
                amount = principal * Math.pow(1 + r / m, m * years);
                interest = amount - principal;
                if (m === 1) freqText = "每年複利";
                else if (m === 2) freqText = "每半年複利";
                else if (m === 4) freqText = "每季複利";
                else if (m === 12) freqText = "每月複利";
                methodDetail = `📐 複利公式：本利和 = ${formatMoney(principal)} × (1 + ${(r/m).toFixed(6)})^(${m * years}) = ${formatMoney(amount)}`;
            }

            document.getElementById('finalAmount').innerText = formatMoney(amount);
            document.getElementById('interestEarned').innerText = formatMoney(interest);
            document.getElementById('principalDisplay').innerText = formatMoney(principal);
            document.getElementById('rateFreqDisplay').innerHTML = ratePercent + '% / ' + freqText;
            document.getElementById('methodDetail').innerHTML = methodDetail;
        }

        function formatMoney(value) {
            if (isNaN(value)) return '---';
            return value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function fillExample(p, r, y, type) {
            document.getElementById('principal').value = p;
            document.getElementById('rate').value = r;
            document.getElementById('years').value = y;
            document.getElementById('interestType').value = type;
            calculate();
        }

        window.onload = function() {
            calculate();
        };

        document.querySelectorAll('.input-field, .select-custom').forEach(el => {
            el.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculate();
            });
        });
    </script>
</body>
</html>
