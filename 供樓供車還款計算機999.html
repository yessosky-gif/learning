<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🏠 供樓還款計算機 · 等額本息</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #e6f0f9 0%, #d0e2f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 8px;
        }
        .calculator-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            box-shadow: 0 16px 28px -8px rgba(0, 40, 65, 0.3), 0 0 0 1px rgba(255,255,255,0.7) inset;
            width: 100%;
            max-width: 540px;
            padding: 14px 18px;
        }
        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 2px 0;
            background: linear-gradient(135deg, #0f4c5c, #1f6e8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        h2::after {
            content: "🏦";
            font-size: 1.6rem;
        }
        .subhead {
            font-size: 0.7rem;
            color: #1e5a77;
            margin-bottom: 10px;
            border-left: 4px solid #3b9cbc;
            padding-left: 12px;
            background: #e5f0fb70;
            border-radius: 0 14px 14px 0;
            line-height: 1.3;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .input-group {
            flex: 1 1 120px;
            min-width: 110px;
        }
        label {
            font-weight: 600;
            font-size: 0.7rem;
            color: #0f4057;
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.2px;
        }
        .input-field {
            width: 100%;
            padding: 6px 10px;
            font-size: 0.85rem;
            border: 2px solid #bfd7e9;
            border-radius: 28px;
            background: white;
            outline: none;
            transition: 0.1s;
        }
        .input-field:focus {
            border-color: #1f7a9e;
            box-shadow: 0 2px 5px rgba(31,122,158,0.1);
        }
        button {
            width: 100%;
            background: #0f4c5c;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 36px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 12px -5px #0f4c5cb0;
            margin: 8px 0 12px 0;
            border: 1px solid #ffffff70;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        button:hover {
            background: #1b657b;
            transform: scale(1.01);
        }
        .result-panel {
            background: #e1effa;
            border-radius: 24px;
            padding: 10px 14px;
            border: 2px solid white;
            box-shadow: inset 0 1px 3px #aac4dc, 0 6px 10px -4px #6e95b4;
            margin-bottom: 12px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 4px 0;
            flex-wrap: wrap;
        }
        .result-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #144d64;
        }
        .result-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: #0f4c5c;
            line-height: 1.2;
            text-align: right;
        }
        .sub-value {
            font-size: 1rem;
            color: #1b6b4f;
            font-weight: 600;
        }
        .divider-light {
            height: 1px;
            background: linear-gradient(90deg, #b6d2e9, #ffffff, #b6d2e9);
            margin: 6px 0 4px 0;
        }
        .dsr-section {
            background: #d4e5f3;
            border-radius: 20px;
            padding: 6px 12px;
            margin: 6px 0 0;
            border: 1px solid #ffffff;
        }
        .dsr-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #074154;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .dsr-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin: 2px 0;
            color: #1c5068;
        }
        .dsr-pass {
            color: #1b7a4b;
            font-weight: 700;
        }
        .dsr-fail {
            color: #b13e3e;
            font-weight: 700;
        }
        .schedule-toggle {
            background: #cde1f1;
            border-radius: 30px;
            padding: 5px 12px;
            margin: 8px 0 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            color: #0d4056;
            border: 1px solid white;
            font-size: 0.8rem;
        }
        .schedule-table {
            max-height: 210px;
            overflow-y: auto;
            background: #f5faff;
            border-radius: 18px;
            padding: 6px;
            font-size: 0.7rem;
            border: 1px solid #b9d3ea;
            display: none;
        }
        .schedule-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .schedule-table th {
            background: #c7dff5;
            color: #0a3343;
            padding: 4px 3px;
            position: sticky;
            top: 0;
            font-size: 0.7rem;
        }
        .schedule-table td {
            text-align: right;
            padding: 3px 3px;
            border-bottom: 1px solid #d2e2f0;
        }
        .schedule-table td:first-child {
            text-align: center;
        }
        .footnote {
            font-size: 0.6rem;
            color: #3f6f8a;
            text-align: center;
            margin-top: 8px;
            background: #d7e9f8;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <h2>📆 供樓·供車計算機999-by yessosky</h2>
        <div class="subhead">等額本息 · 每月定額還款 · 即睇利息總額</div>

        <!-- 主要輸入列 -->
        <div class="input-row">
            <div class="input-group">
                <label>💰 貸款金額 ($)</label>
                <input type="number" id="loanAmount" class="input-field" value="3000000" step="1000">
            </div>
            <div class="input-group">
                <label>📉 年利率 (%)</label>
                <input type="number" id="interestRate" class="input-field" value="3.5" step="0.1">
            </div>
            <div class="input-group">
                <label>⏳ 還款期 (年)</label>
                <input type="number" id="loanYears" class="input-field" value="30" step="1">
            </div>
        </div>

        <!-- 每月收入 (DSR試算用) -->
        <div style="margin-bottom: 8px;">
            <label>🧑‍💼 每月收入 ($) — 試算供款佔入息比率 (DSR)</label>
            <input type="number" id="monthlyIncome" class="input-field" value="60000" step="1000">
        </div>

        <button onclick="calculateLoan()">
            <span>🧮</span> 計算每月供款 <span>📊</span>
        </button>

        <!-- 主要結果面板 -->
        <div class="result-panel" id="resultPanel">
            <div class="result-row">
                <span class="result-label">📌 每月還款</span>
                <span class="result-value" id="monthlyPayment">---</span>
            </div>
            <div class="result-row">
                <span class="result-label">💹 總利息支出</span>
                <span class="result-value sub-value" id="totalInterest">---</span>
            </div>
            <div class="result-row">
                <span class="result-label">🏦 本金+利息 總額</span>
                <span class="result-value sub-value" id="totalPayment">---</span>
            </div>
            <div class="divider-light"></div>
            <!-- DSR 供款佔入息比率 -->
            <div class="dsr-section" id="dsrSection">
                <div class="dsr-title">📋 供款佔入息比率 (DSR)</div>
                <div class="dsr-row">
                    <span>每月供款 / 月入</span>
                    <span id="dsrRatio">---</span>
                </div>
                <div class="dsr-row">
                    <span>🏦 銀行普遍要求</span>
                    <span>≦ 50%</span>
                </div>
                <div class="dsr-row" id="dsrResult"></div>
            </div>
        </div>

        <!-- 每月還款明細表 (攤銷表) 摺疊區 -->
        <div class="schedule-toggle" onclick="toggleSchedule()">
            <span>📅 查看每月還款明細 (本金/利息)</span>
            <span id="toggleIcon">▼</span>
        </div>
        <div id="scheduleTable" class="schedule-table">
            <table id="amortTable">
                <thead>
                    <tr><th>期數</th><th>還款額</th><th>利息部分</th><th>本金部分</th><th>剩餘本金</th>\
                </thead>
                <tbody id="amortBody"></tbody>
            \\
        </div>

        <div class="footnote">
            ⚡ 採用等額本息公式 · 實際利率及條款以銀行最終批核為準
        </div>
    </div>

    <script>
        function calculateLoan() {
            const p = parseFloat(document.getElementById('loanAmount').value);
            const rateYear = parseFloat(document.getElementById('interestRate').value);
            const years = parseFloat(document.getElementById('loanYears').value);
            const monthlyIncome = parseFloat(document.getElementById('monthlyIncome').value) || 0;

            if (isNaN(p) || isNaN(rateYear) || isNaN(years) || p <= 0 || rateYear < 0 || years <= 0) {
                alert('請輸入有效的正數（貸款額>0，利率>=0，年期>0）');
                return;
            }

            const r = rateYear / 100 / 12;
            const n = Math.round(years * 12);
            let monthly = 0;
            if (r === 0) {
                monthly = p / n;
            } else {
                const factor = Math.pow(1 + r, n);
                monthly = p * r * factor / (factor - 1);
            }

            const totalPay = monthly * n;
            const totalInterest = totalPay - p;

            document.getElementById('monthlyPayment').innerText = formatMoney(monthly) + '/月';
            document.getElementById('totalInterest').innerText = formatMoney(totalInterest);
            document.getElementById('totalPayment').innerText = formatMoney(totalPay);

            if (monthlyIncome > 0 && !isNaN(monthlyIncome)) {
                const dsr = monthly / monthlyIncome * 100;
                document.getElementById('dsrRatio').innerText = dsr.toFixed(2) + '%';
                const dsrResultEl = document.getElementById('dsrResult');
                if (dsr <= 50) {
                    dsrResultEl.innerHTML = '<span class="dsr-pass">✅ 符合基本DSR要求 (≦50%)</span>';
                } else {
                    dsrResultEl.innerHTML = '<span class="dsr-fail">⚠️ DSR超過50%，銀行可能要求增加擔保人或縮短還款期</span>';
                }
            } else {
                document.getElementById('dsrRatio').innerText = '— (輸入月入)';
                document.getElementById('dsrResult').innerHTML = '';
            }

            generateAmortization(p, r, n, monthly);
            document.getElementById('scheduleTable').style.display = 'none';
            document.getElementById('toggleIcon').innerText = '▼';
        }

        function generateAmortization(principal, monthlyRate, totalMonths, monthlyPayment) {
            let balance = principal;
            const tbody = document.getElementById('amortBody');
            tbody.innerHTML = '';
            for (let i = 1; i <= totalMonths; i++) {
                if (balance <= 0) break;
                let interestPaid = balance * monthlyRate;
                let principalPaid = monthlyPayment - interestPaid;
                if (principalPaid > balance) principalPaid = balance;
                interestPaid = monthlyPayment - principalPaid;
                let newBalance = balance - principalPaid;
                if (newBalance < 0) newBalance = 0;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="text-align:center">${i}</td>
                    <td>${formatMoney(monthlyPayment)}</td>
                    <td>${formatMoney(interestPaid)}</td>
                    <td>${formatMoney(principalPaid)}</td>
                    <td>${formatMoney(newBalance)}</td>
                `;
                tbody.appendChild(row);
                balance = newBalance;
                if (balance <= 0.01) break;
            }
        }

        function formatMoney(value) {
            if (isNaN(value)) return '---';
            return value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function toggleSchedule() {
            const table = document.getElementById('scheduleTable');
            const icon = document.getElementById('toggleIcon');
            if (table.style.display === 'none' || table.style.display === '') {
                table.style.display = 'block';
                icon.innerText = '▲';
            } else {
                table.style.display = 'none';
                icon.innerText = '▼';
            }
        }

        window.onload = function() {
            calculateLoan();
        };

        document.querySelectorAll('.input-field').forEach(el => {
            el.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') calculateLoan();
            });
        });
    </script>
</body>
</html>
