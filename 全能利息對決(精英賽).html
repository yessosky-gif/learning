<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>利息速算對決 - 最終優化版</title>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: #f0f4f8; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* 頂部標題 */
        .header { 
            background: #2c3e50; 
            color: white; 
            padding: 8px; 
            text-align: center; 
            flex-shrink: 0; 
        }
        h1 { margin: 0; font-size: 22px; }
        #timer { font-family: 'Courier New', monospace; font-size: 30px; color: #f1c40f; font-weight: bold; }

        /* 題目顯示區：最大化 */
        .mission-box { 
            background: white; 
            margin: 10px auto; 
            padding: 15px; 
            width: 94%; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 6px solid #3498db;
            flex-shrink: 0;
        }
        .type-tag { 
            display: inline-block; 
            padding: 5px 25px; 
            border-radius: 6px; 
            color: white; 
            font-weight: bold; 
            font-size: 28px; 
            margin-bottom: 10px; 
        }
        .tag0 { background: #27ae60; } .tag1 { background: #e67e22; } .tag2 { background: #9b59b6; } .tag3 { background: #e91e63; }
        
        .question-text {
            font-size: 42px; 
            color: #333;
            font-weight: bold;
            line-height: 1.2;
        }
        .val { color: #d35400; font-size: 50px; text-decoration: underline; }
        .label { color: #7f8c8d; font-size: 30px; }

        /* 學生對賽區：緊湊縮小 */
        .duel-container { 
            display: flex; 
            flex: 1; 
            padding: 5px 20px; 
            gap: 15px; 
            min-height: 0; 
        }
        .player-card { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-radius: 15px; 
            border: 2px solid #ddd; 
            padding: 10px;
        }
        .player-a { background: #eef7ff; border-color: #3498db; }
        .player-b { background: #fff9ee; border-color: #f1c40f; }
        
        .score-info { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; }
        .score-label { font-size: 18px; color: #555; }
        .score { font-size: 45px; font-weight: bold; color: #333; }
        
        .input-group { text-align: center; width: 90%; }
        input { 
            width: 80%; 
            padding: 8px; 
            font-size: 28px; 
            border: 2px solid #ccc; 
            border-radius: 8px; 
            text-align: center; 
        }
        .btn-submit { 
            margin-top: 5px;
            padding: 8px 20px; 
            font-size: 18px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            background: #2c3e50; 
            color: white; 
        }

        /* 狀態顯示文字 */
        .status-msg {
            margin-top: 8px;
            font-size: 22px;
            font-weight: bold;
            min-height: 30px;
        }
        .msg-correct { color: #27ae60; }
        .msg-wrong { color: #e74c3c; }

        /* 底部控制區：顯著按鈕 */
        .controls { 
            padding: 15px; 
            text-align: center; 
            background: #ecf0f1; 
            flex-shrink: 0; 
        }
        .btn-main { 
            padding: 12px 60px; 
            font-size: 28px; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            font-weight: bold; 
            margin: 0 20px; 
            box-shadow: 0 4px 0 #bdc3c7;
        }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }
        .btn-next { background: #27ae60; box-shadow: 0 4px 0 #1e8449; }
        .btn-reset { background: #e74c3c; box-shadow: 0 4px 0 #c0392b; }
    </style>
</head>
<body>

<div class="header">
    <h1>🏆 全能利息對決 (精英賽)</h1>
    <div id="timer">00.00</div>
</div>

<div class="mission-box" id="display">
    <div style="font-size: 32px; color: #7f8c8d;">點擊「生成下一題」開始對賽</div>
</div>

<div class="duel-container">
    <div class="player-card player-a">
        <div class="score-info">
            <div class="score-label">學生 A 分數</div>
            <div class="score" id="scoreA">0</div>
        </div>
        <div class="input-group">
            <input type="number" id="inA" placeholder="答案">
            <br>
            <button class="btn-submit" onclick="submitAns('A')">確定提交</button>
            <div id="msgA" class="status-msg"></div>
        </div>
    </div>

    <div class="player-card player-b">
        <div class="score-info">
            <div class="score-label">學生 B 分數</div>
            <div class="score" id="scoreB">0</div>
        </div>
        <div class="input-group">
            <input type="number" id="inB" placeholder="答案">
            <br>
            <button class="btn-submit" onclick="submitAns('B')">確定提交</button>
            <div id="msgB" class="status-msg"></div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn-main btn-next" onclick="newRound()">🎲 生成下一題</button>
    <button class="btn-main btn-reset" onclick="resetAll()">♻️ 重置積分</button>
</div>

<script>
    let targetA = 0;
    let sA = 0, sB = 0;
    let timeStart;
    let timerInt;
    let locked = true;

    // 回車鍵監聽
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (document.activeElement.id === 'inA') submitAns('A');
            else if (document.activeElement.id === 'inB') submitAns('B');
        }
    });

    function newRound() {
        locked = false;
        clearInterval(timerInt);
        
        // 重置狀態
        document.getElementById('inA').value = "";
        document.getElementById('inB').value = "";
        document.getElementById('inA').disabled = false;
        document.getElementById('inB').disabled = false;
        document.getElementById('msgA').innerText = "";
        document.getElementById('msgB').innerText = "";
        document.getElementById('msgA').className = "status-msg";
        document.getElementById('msgB').className = "status-msg";

        const P = (Math.floor(Math.random() * 15) + 2) * 5000; 
        const r = (Math.random() * 7 + 3).toFixed(1); 
        const n = Math.floor(Math.random() * 4) + 1;
        const mode = Math.floor(Math.random() * 4); 
        const r_dec = r / 100;
        
        let mText = "";
        if (mode === 0) {
            mText = "模式：單利計息";
            targetA = Math.round(P * (1 + r_dec * n));
        } else if (mode === 1) {
            mText = "模式：每年複利";
            targetA = Math.round(P * Math.pow(1 + r_dec, n));
        } else if (mode === 2) {
            const m = [2, 4, 12][Math.floor(Math.random() * 3)];
            const freq = m==2?"半年": (m==4?"每季":"每月");
            mText = `模式：複利 (${freq}計息一次)`;
            targetA = Math.round(P * Math.pow(1 + r_dec/m, n * m));
        } else {
            mText = "模式：連續複利";
            targetA = Math.round(P * Math.exp(r_dec * n));
        }

        document.getElementById('display').innerHTML = `
            <div class="type-tag tag${mode}">${mText}</div>
            <div class="question-text">
                <span class="label">P:</span> <span class="val">$${P.toLocaleString()}</span> &nbsp;
                <span class="label">r:</span> <span class="val">${r}%</span> &nbsp;
                <span class="label">n:</span> <span class="val">${n}年</span>
            </div>
        `;

        timeStart = Date.now();
        timerInt = setInterval(() => {
            document.getElementById('timer').innerText = ((Date.now() - timeStart)/1000).toFixed(2);
        }, 10);
    }

    function submitAns(p) {
        if (locked) return;
        const val = parseFloat(document.getElementById('in' + p).value);
        const msgEl = document.getElementById('msg' + p);
        
        if (Math.abs(val - targetA) <= 3) {
            locked = true;
            clearInterval(timerInt);
            if (p === 'A') { sA++; document.getElementById('scoreA').innerText = sA; }
            else { sB++; document.getElementById('scoreB').innerText = sB; }
            
            msgEl.innerText = "✅ 答對了！";
            msgEl.className = "status-msg msg-correct";
            
            document.getElementById('inA').disabled = true;
            document.getElementById('inB').disabled = true;
        } else {
            msgEl.innerText = "❌ 答錯了，請檢查公式！";
            msgEl.className = "status-msg msg-wrong";
        }
    }

    function resetAll() {
        if(confirm("確定重置積分？")) {
            sA = 0; sB = 0;
            document.getElementById('scoreA').innerText = "0";
            document.getElementById('scoreB').innerText = "0";
            document.getElementById('display').innerHTML = '<div style="font-size: 32px; color: #7f8c8d;">積分已重置，點擊「生成下一題」開始</div>';
        }
    }
</script>
</body>
</html>
