<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>利息速算對決 - 全設備適應版</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: #f0f4f8; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            height: -webkit-fill-available; /* 修正 iOS Safari 高度問題 */
        }

        /* 頂部標題 */
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 10px; 
            text-align: center; 
            flex-shrink: 0; 
        }
        h1 { margin: 0; font-size: 1.2rem; }
        #timer { font-family: 'Courier New', monospace; font-size: 1.8rem; color: #f1c40f; font-weight: bold; }

        /* 題目顯示區 */
        .mission-box { 
            background: white; 
            margin: 10px auto; 
            padding: 15px; 
            width: 90%; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 5px solid var(--accent);
            flex-shrink: 0;
        }
        .type-tag { 
            display: inline-block; 
            padding: 4px 15px; 
            border-radius: 4px; 
            color: white; 
            font-weight: bold; 
            font-size: 1.2rem; 
            margin-bottom: 8px; 
        }
        .tag0 { background: var(--success); } 
        .tag1 { background: #e67e22; } 
        .tag2 { background: #9b59b6; } 
        .tag3 { background: #e91e63; }
        
        .question-text {
            font-size: 1.5rem; 
            color: #333;
            font-weight: bold;
            word-break: break-all;
        }
        .val { color: #d35400; font-size: 1.8rem; border-bottom: 2px solid #d35400; }

        /* 學生對賽區 - 關鍵響應式佈局 */
        .duel-container { 
            display: flex; 
            flex: 1; 
            padding: 10px; 
            gap: 10px; 
            min-height: 0; 
            flex-direction: row; /* 電腦/iPad 預設橫排 */
        }

        /* 手機模式：寬度小於 768px 時切換為垂直堆疊 */
        @media (max-width: 768px) {
            .duel-container { flex-direction: column; overflow-y: auto; }
            .question-text { font-size: 1.2rem; }
            .val { font-size: 1.4rem; }
            .type-tag { font-size: 1rem; }
            .btn-main { width: 80%; margin: 5px 0 !important; }
        }

        .player-card { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            border: 2px solid #ddd; 
            padding: 10px;
            min-height: 120px;
        }
        .player-a { background: #eef7ff; border-color: var(--accent); }
        .player-b { background: #fff9ee; border-color: #f1c40f; }
        
        .score-info { font-size: 1rem; font-weight: bold; margin-bottom: 5px; }
        .score { font-size: 2.5rem; color: #333; margin: 0; }
        
        input { 
            width: 85%; 
            padding: 10px; 
            font-size: 1.5rem; 
            border: 2px solid #ccc; 
            border-radius: 8px; 
            text-align: center; 
            -webkit-appearance: none; /* 移除 iOS 預設陰影 */
        }

        .btn-submit { 
            margin-top: 8px;
            padding: 10px 20px; 
            font-size: 1rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            background: var(--primary); 
            color: white; 
            width: 80%;
            touch-action: manipulation; /* 優化移動端點擊 */
        }

        .status-msg { margin-top: 5px; font-size: 1rem; font-weight: bold; min-height: 1.2rem; }
        .msg-correct { color: var(--success); }
        .msg-wrong { color: var(--danger); }

        /* 底部控制區 */
        .controls { 
            padding: 15px; 
            text-align: center; 
            background: #ecf0f1; 
            flex-shrink: 0; 
        }
        .btn-main { 
            padding: 12px 30px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-weight: bold; 
            margin: 0 10px; 
            box-shadow: 0 4px 0 #bdc3c7;
        }
        .btn-next { background: var(--success); box-shadow: 0 4px 0 #1e8449; }
        .btn-reset { background: var(--danger); box-shadow: 0 4px 0 #c0392b; }
    </style>
</head>
<body>

<div class="header">
    <h1>🏆 全能利息雙人對決</h1>
    <div id="timer">00.00</div>
</div>

<div class="mission-box" id="display">
    <div style="font-size: 1.2rem; color: #7f8c8d;">點擊「生成下一題」開始</div>
</div>

<div class="duel-container">
    <div class="player-card player-a">
        <div class="score-info">學生 A：<span class="score" id="scoreA">0</span> 分</div>
        <input type="number" id="inA" placeholder="輸入答案" pattern="\d*">
        <button class="btn-submit" onclick="submitAns('A')">提交</button>
        <div id="msgA" class="status-msg"></div>
    </div>

    <div class="player-card player-b">
        <div class="score-info">學生 B：<span class="score" id="scoreB">0</span> 分</div>
        <input type="number" id="inB" placeholder="輸入答案" pattern="\d*">
        <button class="btn-submit" onclick="submitAns('B')">提交</button>
        <div id="msgB" class="status-msg"></div>
    </div>
</div>

<div class="controls">
    <button class="btn-main btn-next" onclick="newRound()">🎲 下一題</button>
    <button class="btn-main btn-reset" onclick="resetAll()">♻️ 重置</button>
</div>

<script>
    let targetA = 0;
    let sA = 0, sB = 0;
    let timeStart, timerInt, locked = true;

    function newRound() {
        locked = false;
        clearInterval(timerInt);
        document.getElementById('inA').value = "";
        document.getElementById('inB').value = "";
        document.getElementById('inA').disabled = false;
        document.getElementById('inB').disabled = false;
        document.getElementById('msgA').innerText = "";
        document.getElementById('msgB').innerText = "";

        const P = (Math.floor(Math.random() * 15) + 2) * 5000; 
        const r = (Math.random() * 7 + 3).toFixed(1); 
        const n = Math.floor(Math.random() * 4) + 1;
        const mode = Math.floor(Math.random() * 4); 
        const r_dec = r / 100;
        
        let mText = "";
        if (mode === 0) { mText = "單利"; targetA = Math.round(P * (1 + r_dec * n)); }
        else if (mode === 1) { mText = "每年複利"; targetA = Math.round(P * Math.pow(1 + r_dec, n)); }
        else if (mode === 2) {
            const m = [2, 4, 12][Math.floor(Math.random() * 3)];
            mText = `複利 (${m==2?'半年':m==4?'每季':'每月'})`;
            targetA = Math.round(P * Math.pow(1 + r_dec/m, n * m));
        } else { mText = "連續複利"; targetA = Math.round(P * Math.exp(r_dec * n)); }

        document.getElementById('display').innerHTML = `
            <div class="type-tag tag${mode}">${mText}</div>
            <div class="question-text">
                P: <span class="val">$${P.toLocaleString()}</span> r: <span class="val">${r}%</span> n: <span class="val">${n}年</span>
            </div>`;

        timeStart = Date.now();
        timerInt = setInterval(() => {
            document.getElementById('timer').innerText = ((Date.now() - timeStart)/1000).toFixed(2);
        }, 10);
    }

    function submitAns(p) {
        if (locked) return;
        const val = parseFloat(document.getElementById('in' + p).value);
        const msgEl = document.getElementById('msg' + p);
        if (Math.abs(val - targetA) <= 3) {
            locked = true; clearInterval(timerInt);
            if (p === 'A') { sA++; document.getElementById('scoreA').innerText = sA; }
            else { sB++; document.getElementById('scoreB').innerText = sB; }
            msgEl.innerText = "✅ 正確！"; msgEl.className = "status-msg msg-correct";
            document.getElementById('inA').disabled = true; document.getElementById('inB').disabled = true;
        } else {
            msgEl.innerText = "❌ 錯誤！"; msgEl.className = "status-msg msg-wrong";
        }
    }

    function resetAll() {
        if(confirm("重置積分？")) {
            sA = 0; sB = 0;
            document.getElementById('scoreA').innerText = "0";
            document.getElementById('scoreB').innerText = "0";
        }
    }
</script>
</body>
</html>
