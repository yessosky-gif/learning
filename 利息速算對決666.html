<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>利息速算對決666 - yessosky</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden; 
        }

        .header { background: var(--primary); color: white; padding: 5px; text-align: center; flex-shrink: 0; }
        h1 { margin: 0; font-size: 1.1rem; }
        #timer { font-family: 'Courier New', monospace; font-size: 1.5rem; color: #f1c40f; font-weight: bold; }

        .mission-box { 
            background: white; margin: 8px auto; padding: 10px; width: 92%; border-radius: 10px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--accent); flex-shrink: 0;
            min-height: 70px; display: flex; flex-direction: column; justify-content: center;
        }
        .type-tag { display: inline-block; padding: 2px 15px; border-radius: 20px; color: white; font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .tag0 { background: var(--success); } .tag1 { background: #e67e22; } .tag2 { background: #9b59b6; } .tag3 { background: #e91e63; }
        .question-text { font-size: 1.4rem; color: #333; font-weight: bold; }
        .val { color: #d35400; font-size: 1.6rem; border-bottom: 2px solid #f39c12; margin: 0 4px; }

        .duel-container { display: flex; flex: 1; padding: 5px 10px; gap: 10px; min-height: 0; }
        .player-card { 
            flex: 1; display: flex; flex-direction: column; 
            border-radius: 12px; border: 1px solid #dcdde1; padding: 10px; background: #fff;
            overflow: hidden;
        }
        .player-a { border-top: 6px solid var(--accent); }
        .player-b { border-top: 6px solid #f1c40f; }
        
        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-shrink: 0; }
        .score-box { background: var(--primary); color: white; padding: 2px 10px; border-radius: 10px; font-size: 1.3rem; font-weight: bold; }

        .input-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        .display-screen { 
            width: 95%; height: 45px; font-size: 1.6rem; border: 2px solid #dfe6e9; 
            border-radius: 8px; text-align: center; margin-bottom: 8px; background: #fafafa;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            word-break: break-all; overflow: hidden;
        }
        .display-screen:empty::before { content: "請輸入答案"; color: #ccc; font-size: 0.9rem; font-weight: normal; }

        .key-grid-container { width: 95%; max-width: 220px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 100%; }
        .key { 
            padding: 10px 0; font-size: 1.2rem; background: #f1f2f6; border: none;
            border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold;
            box-shadow: 0 2px 0 #ced6e0; user-select: none;
        }
        .key:active { transform: translateY(1px); box-shadow: none; background: #dfe4ea; }
        
        .key-ac { background: #fab1a0; color: #d63031; box-shadow: 0 2px 0 #e17055; }
        .key-del { background: #ffeaa7; color: #d35400; box-shadow: 0 2px 0 #fdcb6e; }
        .key-enter { background: var(--primary); color: white; font-size: 0.95rem; box-shadow: 0 2px 0 #1a252f; }

        .submit-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 5px; 
            width: 100%; 
            margin-top: 5px; 
        }

        .status-msg { margin-top: 8px; font-weight: bold; font-size: 1.1rem; min-height: 1.5rem; flex-shrink: 0; text-align: center; }
        .msg-correct { color: var(--success); }
        .msg-wrong { color: var(--danger); }

        .controls { padding: 10px; text-align: center; background: #ecf0f1; flex-shrink: 0; border-top: 1px solid #ccc; }
        .btn-main { padding: 8px 30px; font-size: 1.3rem; cursor: pointer; border: none; border-radius: 30px; color: white; font-weight: bold; margin: 0 8px; }
        .btn-next { background: var(--success); }
        .btn-reset { background: var(--danger); }
    </style>
</head>
<body>

<div class="header">
    <h1>🏆 利息速算對決666__by yessosky</h1>
    <div id="timer">00.00</div>
</div>

<div class="mission-box" id="display">
    <div style="font-size: 1.1rem; color: #999;">點擊「開始/下一題」開始</div>
</div>

<div class="duel-container">
    <div class="player-card player-a">
        <div class="player-header">
            <span>學生 A</span>
            <span class="score-box" id="scoreA">0</span>
        </div>
        <div class="input-wrap">
            <div id="viewA" class="display-screen"></div>
            <div class="key-grid-container">
                <div class="keypad">
                    <div class="key" onclick="press('A','1')">1</div><div class="key" onclick="press('A','2')">2</div><div class="key" onclick="press('A','3')">3</div>
                    <div class="key" onclick="press('A','4')">4</div><div class="key" onclick="press('A','5')">5</div><div class="key" onclick="press('A','6')">6</div>
                    <div class="key" onclick="press('A','7')">7</div><div class="key" onclick="press('A','8')">8</div><div class="key" onclick="press('A','9')">9</div>
                    <div class="key key-ac" onclick="press('A','ac')">AC</div><div class="key" onclick="press('A','0')">0</div><div class="key" onclick="press('A','.')">.</div>
                </div>
                <div class="submit-row">
                    <div class="key key-enter" onclick="submitAns('A')">提交答案</div>
                    <div class="key key-del" onclick="press('A','del')">←</div>
                </div>
            </div>
            <div id="msgA" class="status-msg"></div>
        </div>
    </div>

    <div class="player-card player-b">
        <div class="player-header">
            <span>學生 B</span>
            <span class="score-box" id="scoreB">0</span>
        </div>
        <div class="input-wrap">
            <div id="viewB" class="display-screen"></div>
            <div class="key-grid-container">
                <div class="keypad">
                    <div class="key" onclick="press('B','1')">1</div><div class="key" onclick="press('B','2')">2</div><div class="key" onclick="press('B','3')">3</div>
                    <div class="key" onclick="press('B','4')">4</div><div class="key" onclick="press('B','5')">5</div><div class="key" onclick="press('B','6')">6</div>
                    <div class="key" onclick="press('B','7')">7</div><div class="key" onclick="press('B','8')">8</div><div class="key" onclick="press('B','9')">9</div>
                    <div class="key key-ac" onclick="press('B','ac')">AC</div><div class="key" onclick="press('B','0')">0</div><div class="key" onclick="press('B','.')">.</div>
                </div>
                <div class="submit-row">
                    <div class="key key-enter" onclick="submitAns('B')">提交答案</div>
                    <div class="key key-del" onclick="press('B','del')">←</div>
                </div>
            </div>
            <div id="msgB" class="status-msg"></div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn-main btn-next" onclick="newRound()">🎲 開始/下一題</button>
    <button class="btn-main btn-reset" onclick="resetScoreOnly()">♻️ 重置積分</button>
</div>

<script>
    let targetVal = 0, sA = 0, sB = 0;
    let timeStart, timerInt, locked = true;
    let inputA = "", inputB = "";

    function press(p, v) {
        if (locked) return;
        let target = p === 'A' ? inputA : inputB;

        if (v === 'ac') target = "";
        else if (v === 'del') target = target.slice(0, -1);
        else if (v === '.') {
            if (!target.includes('.') && target.length < 10) target += '.';
        }
        else if (target.length < 12) target += v;

        if (p === 'A') { inputA = target; document.getElementById('viewA').innerText = inputA; }
        else { inputB = target; document.getElementById('viewB').innerText = inputB; }
    }

    function newRound() {
        locked = false; clearInterval(timerInt);
        inputA = ""; inputB = "";
        document.getElementById('viewA').innerText = "";
        document.getElementById('viewB').innerText = "";
        document.getElementById('msgA').innerText = "";
        document.getElementById('msgB').innerText = "";
        document.getElementById('msgA').className = "status-msg";
        document.getElementById('msgB').className = "status-msg";

        // 本金優化：生成幾萬幾千，或十幾萬的隨機數
        // 邏輯：隨機 10,000 ~ 199,000，並以 1,000 為單位
        const P = (Math.floor(Math.random() * 190) + 10) * 1000; 
        const r = (Math.random() * 4 + 2).toFixed(1); 
        const n = Math.floor(Math.random() * 3) + 1;
        const mode = Math.floor(Math.random() * 4); 
        const r_dec = r / 100;
        
        let mText = "";
        if (mode === 0) { mText = "單利"; targetVal = P * (1 + r_dec * n); }
        else if (mode === 1) { mText = "每年複利"; targetVal = P * Math.pow(1 + r_dec, n); }
        else if (mode === 2) {
            const m = [2, 4, 12][Math.floor(Math.random() * 3)];
            mText = `複利(${m==2?'半年':m==4?'每季':'每月'})`;
            targetVal = P * Math.pow(1 + r_dec/m, n * m);
        } else { mText = "連續複利"; targetVal = P * Math.exp(r_dec * n); }

        targetVal = Math.round(targetVal * 10) / 10;

        document.getElementById('display').innerHTML = `
            <div class="type-tag tag${mode}">${mText}</div>
            <div class="question-text">P:$<span class="val">${P.toLocaleString()}</span> r:<span class="val">${r}%</span> n:<span class="val">${n}y</span></div>`;

        timeStart = Date.now();
        timerInt = setInterval(() => {
            document.getElementById('timer').innerText = ((Date.now() - timeStart)/1000).toFixed(2);
        }, 10);
    }

    function submitAns(p) {
        if (locked) return;
        const currentInput = (p === 'A' ? inputA : inputB);
        if (currentInput === "" || currentInput === ".") return;
        
        const val = parseFloat(currentInput);
        const msgEl = document.getElementById('msg' + p);
        
        // 考量到大額數字，容許誤差保持在 0.15 內
        if (Math.abs(val - targetVal) <= 0.15) {
            locked = true; clearInterval(timerInt);
            if (p === 'A') { sA++; document.getElementById('scoreA').innerText = sA; }
            else { sB++; document.getElementById('scoreB').innerText = sB; }
            msgEl.innerText = "✅ 答對了！"; msgEl.className = "status-msg msg-correct";
        } else {
            msgEl.innerText = "❌ 答錯了！"; msgEl.className = "status-msg msg-wrong";
        }
    }

    function resetScoreOnly() {
        sA = 0; sB = 0; locked = true; clearInterval(timerInt);
        document.getElementById('scoreA').innerText = "0";
        document.getElementById('scoreB').innerText = "0";
        document.getElementById('timer').innerText = "00.00";
        document.getElementById('display').innerHTML = '<div style="font-size: 1.1rem; color: #999;">積分已清空。等待開始下一題</div>';
        inputA = ""; inputB = "";
        document.getElementById('viewA').innerText = "";
        document.getElementById('viewB').innerText = "";
        document.getElementById('msgA').innerText = "";
        document.getElementById('msgB').innerText = "";
    }
</script>
</body>
</html>
